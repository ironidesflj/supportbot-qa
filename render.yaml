services:
  - type: web
    name: supportbot-qa-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.1
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: EMBEDDING_MODEL
        value: models/text-embedding-004
      - key: GEMINI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION_NAME
        value: supportbot_kb
      - key: KATZILLA_API_KEY
        sync: false
      - key: RETRIEVAL_TOP_K
        value: "3"
      - key: SIMILARITY_THRESHOLD
        value: "0.75"
      - key: CORS_ALLOW_ORIGINS
        sync: false
